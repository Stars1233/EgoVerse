name: Feature Request
description: Suggest a new feature or improvement
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Have an idea for EgoVerse? We'd love to hear it.

  - type: dropdown
    id: component
    attributes:
      label: Component
      description: Which area does this relate to?
      options:
        - Data Processing
        - Training / Algorithms
        - Robot Control / Deployment
        - Dataset Management
        - New Embodiment Support
        - Documentation
        - Other
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: Problem or Motivation
      description: What problem does this solve, or what workflow does it improve?
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: How would you like this to work?
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Any workarounds or alternative approaches you've thought about.
