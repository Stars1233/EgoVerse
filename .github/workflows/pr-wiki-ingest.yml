# Copy this file to: EgoVerse/.github/workflows/pr-wiki-ingest.yml
#
# On every PR merge, exports the diff + review comments and drops them into
# the Obsidian vault's sources/prs/ folder so Claude can ingest them.
#
# Required secrets:
#   OBSIDIAN_VAULT_REPO — "GaTech-RL2/egoverse-obsidian"
#   VAULT_PAT           — GitHub Personal Access Token with write access to the vault repo
#                         (Settings → Developer settings → Personal access tokens → repo scope)

name: PR Wiki Ingest

on:
  pull_request:
    types: [closed]

jobs:
  export-to-wiki:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    permissions:
      pull-requests: read
      contents: read

    steps:
      - name: Checkout EgoVerse
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests PyGithub

      - name: Export PR to JSON
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_BODY: ${{ github.event.pull_request.body }}
          PR_AUTHOR: ${{ github.event.pull_request.user.login }}
          PR_MERGED_AT: ${{ github.event.pull_request.merged_at }}
          BASE_REF: ${{ github.event.pull_request.base.ref }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
        run: python .github/scripts/export_pr.py

      - name: Push to wiki vault
        uses: dmnemec/copy_file_to_another_repo_action@main
        env:
          API_TOKEN_GITHUB: ${{ secrets.VAULT_PAT }}
        with:
          source_file: "pr_export.json"
          destination_repo: ${{ secrets.OBSIDIAN_VAULT_REPO }}
          destination_folder: "raw/prs"
          destination_branch: "main"
          user_email: "github-actions@github.com"
          user_name: "EgoVerse Bot"
          commit_message: "chore: ingest PR #${{ github.event.pull_request.number }} — ${{ github.event.pull_request.title }}"
