# ───────────────── aria-ray-cluster.yaml ─────────────────
# Launch with AWS_PROFILE=clusterv2 ray up egomimic/scripts/aria_process/aria-cluster.yaml
cluster_name: aria-ray-cluster

provider:
  type: aws
  region: us-east-2
  cache_stopped_nodes: false

auth:
  ssh_user: ubuntu
  ssh_private_key: ~/.ssh/rldb-base-pem.pem

rsync_exclude:
  - "emimic/"
  - ".git/"
  - "**/__pycache__/"
  - "*.pyc"
  - "logs/"
  - "*.parquet"

max_workers: 140
idle_timeout_minutes: 5

available_node_types:
  head_node:
    node_config:
      InstanceType: t3a.2xlarge
      KeyName: rldb-base-pem
      ImageId: ami-08c4d70c31f91a5ac
      IamInstanceProfile:
        Arn: arn:aws:iam::556885871428:instance-profile/ray-autoscaler-v1
      BlockDeviceMappings:
        - DeviceName: /dev/sda1
          Ebs: { VolumeSize: 50 }
    resources: { CPU: 8 }
    min_workers: 0
    max_workers: 0

  worker_small:
    node_config:
      InstanceType: r6a.2xlarge
      KeyName: rldb-base-pem
      ImageId: ami-08c4d70c31f91a5ac
      IamInstanceProfile:
        Arn: arn:aws:iam::556885871428:instance-profile/ray-autoscaler-v1
      BlockDeviceMappings:
        - DeviceName: /dev/sda1
          Ebs: { VolumeSize: 150 }
    resources: { CPU: 2, aria_small: 1 }
    min_workers: 0
    max_workers: 120 

  worker_big:
    node_config:
      InstanceType: r6a.8xlarge
      IamInstanceProfile:
        Arn: arn:aws:iam::556885871428:instance-profile/ray-autoscaler-v1
      KeyName: rldb-base-pem
      ImageId: ami-08c4d70c31f91a5ac
      BlockDeviceMappings:
        - DeviceName: /dev/sda1
          Ebs: { VolumeSize: 200 } # often worth bumping
    resources: { CPU: 8, aria_big: 1 }
    min_workers: 0
    max_workers: 7

head_node_type: head_node

# ───────── PACKAGES + MOUNTS ─────────────────────────────
initialization_commands:
  - |
    set -euxo pipefail

    # Wait for any cloud-init/unattended upgrades to finish
    while sudo fuser /var/lib/dpkg/lock-frontend >/dev/null 2>&1 \
      || sudo fuser /var/lib/apt/lists/lock >/dev/null 2>&1 \
      || sudo fuser /var/cache/apt/archives/lock >/dev/null 2>&1; do
      echo "Waiting for apt/dpkg locks..."
      sleep 5
    done

    # If a previous apt run was interrupted, fix it
    sudo dpkg --configure -a || true
    sudo apt-get update --fix-missing -yq

    sudo DEBIAN_FRONTEND=noninteractive apt-get update --fix-missing -yq
    sudo DEBIAN_FRONTEND=noninteractive apt-get install -yq python3-pip python3-dev git fuse3
    sudo DEBIAN_FRONTEND=noninteractive apt-get install -yq libgl1 libpq-dev
    sudo DEBIAN_FRONTEND=noninteractive apt-get install -yq ffmpeg libavcodec-dev libavformat-dev libswscale-dev libx264-dev awscli

    echo "=== Testing FFmpeg installation ==="
    if command -v ffmpeg >/dev/null 2>&1; then
      ffmpeg -hide_banner -version | head -n 1
      echo "[OK] FFmpeg is installed and accessible."
    else
      echo "[FAIL] FFmpeg not found in PATH."
    fi
    echo "=== FFmpeg test done ==="

    cd ~/EgoVerse
    pip3 install --no-input -r requirements-ray.txt
    pip3 install --no-input -e external/lerobot
    pip3 install --no-input -e .

setup_commands:
  - |
    chmod +x ~/EgoVerse/egomimic/utils/aws/setup_secret.sh
    R2_SECRET_NAME=r2/rldb/credentials DB_SECRET_NAME=rds/appdb/appuser REGION=us-east-2 \
      bash ~/EgoVerse/egomimic/utils/aws/setup_secret.sh

head_setup_commands:
  - |
    (crontab -l 2>/dev/null \
      | grep -v run_aria_conversion.py \
      | grep -v run_aria_conversion.lock \
      | grep -v ray_worker_gaurdrails.py \
      | grep -v ray_worker_gaurdrails.lock ; \
     echo 'CRON_TZ=America/New_York'; \
     echo '0 20 * * * flock -n /tmp/run_aria_conversion.lock /bin/bash -lc "set -a; . /home/ubuntu/.egoverse_env; set +a; /usr/bin/python3 ~/EgoVerse/egomimic/scripts/aria_process/run_conversion.py --embodiment aria --skip-if-done --debug" >> ~/aria_conversion.log 2>&1'; \
     echo '*/10 * * * * flock -n /tmp/ray_worker_gaurdrails.lock /usr/bin/python3 /home/ubuntu/EgoVerse/egomimic/utils/aws/budget_guardrails/ray_worker_gaurdrails.py >> /home/ubuntu/ray_worker_gaurdrails.log 2>&1') \
     | crontab - || true

  - crontab -l || true
# Ray startup commands - configure GCS to detect dead/stale nodes faster
# ray start --head --dashboard-host=0.0.0.0 --dashboard-port=8265 --include-dashboard=true