# ───────────────── aria-ray-cluster.yaml ─────────────────
cluster_name: aria-ray-cluster

provider:
  type: aws
  region: us-east-2
  cache_stopped_nodes: false

auth:
  ssh_user: ubuntu
  ssh_private_key: ~/.ssh/your-key.pem

max_workers: 50
idle_timeout_minutes: 10

available_node_types:
  head_node:
    node_config:
      InstanceType: t3.xlarge
      ImageId: ami-0def8bb9d7dcec6d0
      KeyName: ryan-mac
      SubnetId: subnet-02fbc81414d827515
      SecurityGroupIds: [sg-01cabcd4f45211888]
      IamInstanceProfile:
        Arn: arn:aws:iam::654654140494:instance-profile/ray-mps-profile
      BlockDeviceMappings:
        - DeviceName: /dev/sda1
          Ebs: { VolumeSize: 50 }
    resources: { CPU: 4 }
    min_workers: 0
    max_workers: 0

  worker_node:
    node_config:
      InstanceType: c5.18xlarge
      ImageId: ami-0def8bb9d7dcec6d0
      KeyName: ryan-mac
      SubnetId: subnet-02fbc81414d827515
      SecurityGroupIds: [sg-01cabcd4f45211888]
      IamInstanceProfile:
        Arn: arn:aws:iam::654654140494:instance-profile/ray-mps-profile
      BlockDeviceMappings:
        - DeviceName: /dev/sda1
          Ebs: { VolumeSize: 50 }
    resources: { CPU: 72 , memory: 155254087680 }
    min_workers: 0
    max_workers: 50

head_node_type: head_node

# ───────── PACKAGES + MOUNTS ─────────────────────────────
initialization_commands:
  - sudo DEBIAN_FRONTEND=noninteractive apt-get update -yq
  - sudo DEBIAN_FRONTEND=noninteractive apt-get install -yq \
      python3-pip python3-dev git fuse3 s3fs libpq-dev libgl1 libsm6 libxext6
  - sudo pip3 install --no-input --upgrade pip setuptools wheel
  - sudo pip3 install --no-input --upgrade ray boto3 sqlalchemy "psycopg[binary]"
  - sudo pip3 install --no-input projectaria-tools==1.6.0 --break-system-packages


setup_commands:
  - sudo mkdir -p /mnt/raw /mnt/processed

  - |
      if mountpoint -q /mnt/raw; then
        echo "/mnt/raw already mounted"
      else
        sudo s3fs rldb:/raw_v2/aria /mnt/raw \
          -o ro \
          -o url=https://s3.us-east-2.amazonaws.com \
          -o iam_role=auto \
          -o allow_other \
          -o umask=000 \
          -o nonempty
      fi

  - |
      if mountpoint -q /mnt/processed; then
        echo "/mnt/processed already mounted"
      else
        sudo s3fs rldb:/processed_v2/aria /mnt/processed \
          -o url=https://s3.us-east-2.amazonaws.com \
          -o iam_role=auto \
          -o allow_other \
          -o umask=000 \
          -o use_path_request_style \
          -o multipart_size=64 \
          -o parallel_count=20 \
          -o del_cache \
          -o complement_stat \
          -o nonempty
      fi

  - |
      git -C ~/EgoVerse fetch origin main --quiet || true
      git -C ~/EgoVerse checkout main -q || true
      git -C ~/EgoVerse pull --quiet || true
      git -C ~/EgoVerse submodule update --init --recursive --quiet || true

  - |
      (crontab -l 2>/dev/null | grep -v run_aria_conversion.py ; \
       echo 'CRON_TZ=America/New_York'; \
       echo '0 18 * * * /usr/bin/python3 ~/EgoVerse/egomimic/scripts/aria_process/run_aria_conversion.py >> ~/aria_conversion.log 2>&1') \
       | crontab - || true
  - crontab -l || true
